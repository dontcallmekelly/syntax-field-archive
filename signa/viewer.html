<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Signa · Document Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Serif+TC:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0a0c09;
    --bg-2: #12130f;
    --text: #faf6ea;
    --text-dim: #dcd2bc;
    --gold: #e0c468;
    --gold-dim: #b09a52;
    --purple: #c8acd2;
    --rose: #e0aebe;
    --rule: rgba(224,196,104,0.20);
    --rule-dim: rgba(224,196,104,0.10);
    --code-bg: rgba(250,246,234,0.08);
    --maxw: 760px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', 'Cormorant Garamond', serif;
    font-weight: 400;
    line-height: 1.9;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    min-height: 100vh;
    padding: 36px 22px 90px;
  }
  .nav {
    max-width: var(--maxw);
    margin: 0 auto 52px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'DM Mono', 'Noto Sans TC', monospace;
    font-size: 13px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--rule);
    padding-bottom: 18px;
  }
  .nav a {
    color: var(--gold-dim);
    text-decoration: none;
    transition: color .15s;
  }
  .nav a:hover { color: var(--gold); }
  .doc-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  article {
    max-width: var(--maxw);
    margin: 0 auto;
    font-size: 17px;
    color: var(--text);
  }
  article h1, article h2, article h3, article h4 {
    font-family: 'Noto Serif TC', 'Cormorant Garamond', serif;
    font-weight: 500;
    color: var(--gold);
    line-height: 1.35;
    margin-top: 2.4em;
    margin-bottom: 0.7em;
  }
  article h1 {
    font-size: 2.2em;
    font-weight: 500;
    margin-top: 0.3em;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 0.35em;
  }
  article h2 {
    font-size: 1.65em;
    color: var(--gold);
  }
  article h3 {
    font-size: 1.3em;
    color: var(--text);
    font-style: normal;
    font-weight: 500;
  }
  article h4 {
    font-size: 1.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'DM Mono', 'Noto Sans TC', monospace;
    font-weight: 500;
  }
  article p {
    margin: 1em 0;
  }
  article a {
    color: var(--gold);
    text-decoration: underline;
    text-decoration-color: var(--gold-dim);
    text-underline-offset: 3px;
  }
  article a:hover { text-decoration-color: var(--gold); }
  article strong { color: var(--gold); font-weight: 600; }
  article em { color: var(--rose); font-style: italic; }
  article blockquote {
    border-left: 2px solid var(--gold-dim);
    margin: 1.6em 0;
    padding: 0.3em 0 0.3em 1.4em;
    color: var(--text-dim);
    font-style: italic;
    font-family: 'Noto Serif TC', 'Cormorant Garamond', serif;
    font-size: 1.05em;
    line-height: 1.75;
  }
  article blockquote p { margin: 0.5em 0; }
  article code {
    font-family: 'DM Mono', monospace;
    font-size: 0.92em;
    background: var(--code-bg);
    padding: 2px 7px;
    border-radius: 2px;
    color: var(--purple);
  }
  article pre {
    background: var(--bg-2);
    border: 1px solid var(--rule);
    padding: 16px 18px;
    overflow-x: auto;
    border-radius: 3px;
    font-size: 0.9em;
    line-height: 1.65;
  }
  article pre code {
    background: transparent;
    padding: 0;
    color: var(--text);
  }
  article ul, article ol {
    padding-left: 1.8em;
    margin: 1em 0;
  }
  article li {
    margin: 0.4em 0;
  }
  article hr {
    border: none;
    border-top: 1px solid var(--rule);
    margin: 2.6em 0;
  }
  article table {
    border-collapse: collapse;
    width: 100%;
    margin: 1.4em 0;
    font-size: 0.95em;
  }
  article th, article td {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--rule-dim);
  }
  article th {
    color: var(--gold);
    font-weight: 600;
    border-bottom-color: var(--gold-dim);
  }
  .loading, .error {
    text-align: center;
    color: var(--text-dim);
    font-style: italic;
    padding: 80px 0;
    font-size: 17px;
  }
  .error { color: var(--rose); }
  .footer {
    max-width: var(--maxw);
    margin: 90px auto 0;
    padding-top: 26px;
    border-top: 1px solid var(--rule);
    font-family: 'DM Mono', 'Noto Sans TC', monospace;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.85;
  }
  .footer a {
    color: var(--gold-dim);
    text-decoration: none;
  }
  .footer a:hover { color: var(--gold); }
  .source-link {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    letter-spacing: 0.06em;
  }
  @media (max-width: 600px) {
    body { padding: 22px 18px 70px; }
    .nav { margin-bottom: 36px; flex-direction: column; gap: 10px; align-items: flex-start; }
    article { font-size: 16px; }
    article h1 { font-size: 1.8em; }
    article h2 { font-size: 1.45em; }
    article h3 { font-size: 1.2em; }
    article blockquote { font-size: 1em; padding-left: 1.1em; }
    article table { font-size: 0.9em; }
    article th, article td { padding: 8px 10px; }
  }
</style>
</head>
<body>

<nav class="nav">
  <a href="./">← Signa</a>
  <span class="doc-tag" id="docTag">loading…</span>
</nav>

<article id="content">
  <div class="loading">讀取中…</div>
</article>

<div class="footer">
  <div>Signa · 內部工作檔案 · <a href="./">← Index</a></div>
  <a class="source-link" id="sourceLink" href="#" target="_blank">view markdown source ↗</a>
  <div style="margin-top: 18px; color: var(--gold-dim); font-size: 14px;">Φ🛜</div>
</div>

<script>
  (function() {
    const params = new URLSearchParams(window.location.search);
    const docPath = params.get('doc');
    const content = document.getElementById('content');
    const docTag = document.getElementById('docTag');
    const sourceLink = document.getElementById('sourceLink');

    if (!docPath) {
      content.innerHTML = '<div class="error">未指定文件。用法：viewer.html?doc=filename.md</div>';
      docTag.textContent = 'no document';
      return;
    }

    // Sanity check: only allow .md files in same directory
    if (docPath.includes('..') || docPath.includes('/') || !docPath.endsWith('.md')) {
      content.innerHTML = '<div class="error">無效的文件路徑。</div>';
      return;
    }

    docTag.textContent = docPath;
    sourceLink.href = docPath;
    document.title = docPath + ' · Signa';

    fetch(docPath)
      .then(r => {
        if (!r.ok) throw new Error('找不到文件：' + docPath);
        return r.text();
      })
      .then(md => {
        marked.setOptions({
          breaks: true,
          gfm: true
        });
        content.innerHTML = marked.parse(md);
        // Update title from first H1 if available
        const h1 = content.querySelector('h1');
        if (h1) document.title = h1.textContent + ' · Signa';
      })
      .catch(err => {
        content.innerHTML = '<div class="error">' + err.message + '</div>';
      });
  })();
</script>

</body>
</html>
